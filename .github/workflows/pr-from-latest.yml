# Quand on push sur "latest" :
#   - ouvre une PR vers "main" (tokens web)
#   - build Android + iOS et ouvre une PR dans android-tokens-poc
name: PR from latest

on:
  push:
    branches: [latest]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: latest
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build all tokens
        run: npm run build

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          if git diff --staged --quiet; then
            echo "No build changes to commit."
          else
            git commit -m "chore: rebuild dist from latest sources"
            git push origin latest
          fi

  pr-to-main:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: latest
          fetch-depth: 0

      - name: Create or update PR to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head latest --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for latest → main"
          else
            gh pr create \
              --base main \
              --head latest \
              --title "chore: sync design tokens → main" \
              --body "Auto-generated PR from **latest** branch.

          Contains web tokens updates (JSON, CSS, SCSS)."
          fi

  sync-to-mobile-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout design tokens repo
        uses: actions/checkout@v4
        with:
          ref: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Android + iOS tokens
        run: npm run build:app

      - name: Clone target mobile repo
        env:
          GH_TOKEN: ${{ secrets.ANDROID_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/Levanikv/android-tokens-poc.git" target-repo

      - name: Copy tokens into target repo
        id: sync
        env:
          GH_TOKEN: ${{ secrets.ANDROID_REPO_TOKEN }}
        run: |
          cd target-repo
          git config user.name "design-tokens-bot"
          git config user.email "design-tokens-bot@users.noreply.github.com"

          BRANCH="sync-design-tokens"
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard origin/main
          else
            git checkout -B "$BRANCH" origin/main
          fi

          # Android tokens
          mkdir -p android
          rm -f android/*.kt
          cp ../dist/android/*.kt android/

          # iOS tokens
          rm -rf ios/Colors.xcassets
          mkdir -p ios
          cp -r ../dist/ios/Colors.xcassets ios/

          git add android/ ios/
          if git diff --staged --quiet; then
            echo "No changes, skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: sync design tokens from Figma"
            git push -f origin "$BRANCH"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR in mobile repo
        if: steps.sync.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.ANDROID_REPO_TOKEN }}
        run: |
          cd target-repo
          EXISTING=$(gh pr list --repo Levanikv/android-tokens-poc --base main --head sync-design-tokens --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists, branch was force-pushed with latest tokens."
          else
            gh pr create \
              --repo Levanikv/android-tokens-poc \
              --base main \
              --head sync-design-tokens \
              --title "chore: sync design tokens from Figma" \
              --body "Auto-generated PR from [accor-design-tokens](https://github.com/Levanikv/accor-design-tokens) \`latest\` branch.

          Contains updated mobile tokens:
          - \`android/\` — Compose color files (.kt)
          - \`ios/\` — Xcode color assets (.xcassets)"
          fi
